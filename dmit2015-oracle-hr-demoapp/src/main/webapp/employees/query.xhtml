<!-- This is a Faces composition page that extends the layout template -->
<ui:composition
        template="/WEB-INF/faces-templates/layout.xhtml"
        xmlns:ui="jakarta.faces.facelets"
        xmlns:h="jakarta.faces.html"
        xmlns:f="jakarta.faces.core"
        xmlns:p="primefaces"
        xmlns:o="http://omnifaces.org/ui">

    <!-- Page metadata for title, description, and keywords -->
    <ui:param name="title" value="query"/>

    <!-- Define main content for the page -->
    <ui:define name="maincontent">
        <div class="card">
            <h1 role="heading" aria-level="1">Employee Query</h1>
            <h:form id="query_form" role="form">
                <p:panel header="Welcome to Employee Query">
                    <!-- Add page-specific content here, e.g., PrimeFaces components -->

                    <div class="field col-12 md:col-4">
                        <p:outputLabel value="Department Name" for="@next"/>
                        <p:autoComplete id="dept" value="#{employeeQueryView.selectedDepartment}"
                                        completeMethod="#{employeeQueryView.completeDepartment}"
                                        var="dept"
                                        itemLabel="#{dept.departmentName}"
                                        itemValue="#{dept}"
                                        forceSelection="true"
                                        scrollHeight="250"/>
                    </div>

                </p:panel>
            </h:form>
        </div>
    </ui:define>

</ui:composition>
